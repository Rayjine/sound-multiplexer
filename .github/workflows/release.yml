# Release: pushing a v* tag builds the installers on both platforms and
# publishes them as a GitHub Release. The website's download buttons and
# the packaging channels (winget, Flathub) all point at these assets.
name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Tag matches app version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag with tauri.conf.json version
        run: |
          version=$(jq -r .version src-tauri/tauri.conf.json)
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match app version v$version — bump src-tauri/tauri.conf.json first"
            exit 1
          fi

  linux:
    name: Linux bundles
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libdbus-1-dev build-essential libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # NO_STRIP: linuxdeploy's bundled strip predates .relr.dyn sections.
      - name: Build deb/rpm/AppImage bundles
        run: npx --yes "@tauri-apps/cli@^2" build --bundles deb,rpm,appimage
        env:
          NO_STRIP: true

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  windows:
    name: Windows installer
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build NSIS installer (unsigned)
        run: npx --yes "@tauri-apps/cli@^2" build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      # Draft first, publish last: the release only becomes /releases/latest
      # (which the website's download buttons read) once every asset is on it.
      # view/--clobber/edit make a re-run after a partial failure safe.
      # Notes come from .github/releases/<tag>.md when the release ships with
      # hand-written notes; otherwise GitHub generates them from the commits.
      - name: Create GitHub Release with installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes=".github/releases/$GITHUB_REF_NAME.md"
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || {
            if [ -f "$notes" ]; then notes_args=(--notes-file "$notes"); else notes_args=(--generate-notes); fi
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Sound Multiplexer $GITHUB_REF_NAME" \
              "${notes_args[@]}" --draft
          }
          find assets -type f -print0 | xargs -0 gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
