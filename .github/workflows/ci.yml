# CI: Linux test suite (unit + lints + frontend + live E2E against a real
# PipeWire session), Windows build & unit tests (the WASAPI backend's only
# regular exercise on its actual platform), and installable bundles as
# artifacts from every push to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux — tests, lints, live E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libdbus-1-dev build-essential \
            pipewire pipewire-pulse wireplumber pulseaudio-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test --workspace

      - name: Clippy (host)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (Windows code, cross-check)
        run: cargo clippy -p sound-multiplexer-audio --all-targets --target x86_64-pc-windows-msvc -- -D warnings

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui-tests/package-lock.json

      - name: Frontend tests (jsdom)
        working-directory: ui-tests
        run: |
          npm ci
          npm test

      # The live suite drives the real backend against a real PipeWire
      # server. The runner has no audio hardware, so two null sinks stand
      # in as "real" devices (their names are outside the app's prefix,
      # so the backend treats them as ordinary outputs).
      - name: Live end-to-end (PipeWire session)
        run: |
          dbus-run-session -- bash -ec '
            pipewire &
            pipewire-pulse &
            wireplumber &
            for _ in $(seq 1 60); do pactl info >/dev/null 2>&1 && break; sleep 0.5; done
            pactl info
            pactl load-module module-null-sink sink_name=ci_dev_a "sink_properties=device.description=CI-Device-A"
            pactl load-module module-null-sink sink_name=ci_dev_b "sink_properties=device.description=CI-Device-B"
            # set-default-sink needs WirePlumber (it owns the default metadata)
            # and is applied asynchronously — keep nudging until the readback
            # agrees, which doubles as the session-ready barrier for the tests.
            for _ in $(seq 1 60); do
              pactl set-default-sink ci_dev_a 2>/dev/null || true
              test "$(pactl get-default-sink 2>/dev/null)" = ci_dev_a && break
              sleep 0.5
            done
            echo "default sink now: $(pactl get-default-sink)"
            test "$(pactl get-default-sink)" = ci_dev_a
            cargo test -p sound-multiplexer-audio --test linux_live -- --ignored --nocapture
          '

  windows:
    name: Windows — build, tests, installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Unit tests (first-party Windows run)
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build NSIS installer (unsigned)
        run: npx --yes "@tauri-apps/cli@^2" build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  bundle-linux:
    name: Linux — installable bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libdbus-1-dev build-essential libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # NO_STRIP: linuxdeploy's bundled strip predates .relr.dyn sections and
      # dies on libraries built with them; distro libs are pre-stripped anyway.
      - name: Build deb/rpm/AppImage bundles
        run: npx --yes "@tauri-apps/cli@^2" build --bundles deb,rpm,appimage
        env:
          NO_STRIP: true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
